# Nginx configuration for throw-nerd-online
# Place at: /etc/nginx/sites-available/throw-nerd
# Then: sudo ln -s /etc/nginx/sites-available/throw-nerd /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # Replace with your domain or IP

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    root /var/www/throw-nerd-online;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively, but not index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~* \.(css|js|json|png|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must be served from root scope
    location /sw.js {
        add_header Cache-Control "no-store, no-cache";
        add_header Service-Worker-Allowed "/";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

